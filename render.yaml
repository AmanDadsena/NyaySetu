services:
  - type: web
    name: nyaysetu-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: CORS_ORIGINS
        value: "https://your-vercel-frontend-domain.vercel.app" # You will update this in Render dashboard
      - key: GEMINI_API_KEY
        sync: false # You must set this manually in the Render dashboard
